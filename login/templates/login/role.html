<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>eEducate | Role Select</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container">
        <br>
        <h1>eEducate</h1>
        <div class="card sm-shadow" style="width: 500px;">
            <div class="card-body">
                <div class="card-title">
                    <h2>Select Your Role:</h2>
                </div>
                <div class="card-subtitle">
                    <h6>Student, Educator, or Admin?</h6>
                </div>
                <button class="btn btn-primary">Student</button>
                <br>
                <br>
                <button class="btn btn-secondary">Educator</button>
                <br>
                <br>
                <button class="btn btn-secondary">Admin</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
